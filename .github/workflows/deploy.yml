name: Deploy Sandbox to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build Minesweeper
        working-directory: minesweeper
        run: |
          npm ci
          npm run build

      - name: Build PunVault
        working-directory: punvault
        run: |
          npm ci
          npm run build

      - name: Assemble output
        run: |
          mkdir -p dist
          cp index.html dist/
          mkdir -p dist/css
          cp css/landing.css dist/css/
          mkdir -p dist/minesweeper
          cp -r minesweeper/dist/* dist/minesweeper/
          mkdir -p dist/punvault
          cp -r punvault/dist/* dist/punvault/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
